services:
  # ── Backend FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: bruno-melito-hair-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false        # impostare manualmente nel dashboard Render
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false        # es: https://bruno-melito-hair.onrender.com
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend React (Static Site) ──────────────────────────────────────────
  - type: web
    name: bruno-melito-hair-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && DISABLE_ESLINT_PLUGIN=true yarn build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false        # URL del backend Render, es: https://bruno-melito-hair-backend.onrender.com
      - key: REACT_APP_VAPID_PUBLIC_KEY
        sync: false        # opzionale, per push notifications
      - key: NODE_VERSION
        value: 20.11.0
