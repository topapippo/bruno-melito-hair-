<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#D4AF37">
  <title>Offline - Bruno Melito Hair</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B1120;
      color: #F1F5F9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: rgba(212, 175, 55, 0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #D4AF37; }
    .logo { font-size: 14px; letter-spacing: 3px; color: #D4AF37; font-weight: 700; margin-bottom: 24px; }
    h1 { color: #F1F5F9; font-size: 24px; margin-bottom: 12px; }
    p { color: #94A3B8; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #D4AF37; color: #0B1120;
      padding: 14px 28px; border-radius: 12px;
      text-decoration: none; font-weight: 700;
      transition: all 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .status {
      margin-top: 24px; padding: 12px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      color: #D4AF37; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BRUNO MELITO HAIR</div>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    <h1>Sei Offline</h1>
    <p>Nessuna connessione Internet. Controlla il WiFi o i dati mobili e riprova.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Riprova</a>
    <div class="status">Le prenotazioni effettuate verranno sincronizzate automaticamente quando tornerai online.</div>
  </div>
  <script>
    window.addEventListener('online', () => { window.location.reload(); });
  </script>
</body>
</html>
